    artifacts:
      - circuit-leagues-system
      - open-ergo-plane
      - platform-capabilities

  - id: circuit-leagues-system
    artifacts:
      - circuit-leagues-web-surface
      - circuit-leagues-store-android
      - circuit-leagues-store-ios

  - id: circuit-leagues-web-surface
