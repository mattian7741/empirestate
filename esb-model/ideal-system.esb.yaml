# Circuit Leagues — ideal end-state (v1: PWA + auth/session only)
# ESB exercise: logical names only. Environment at invocation, not in this file.
# Workflow narrative: landing → identifier → HTTP gateway 200 → code field;
# gateway → openergo transport → authcode-generator (+ user store) → transport
# → email-sender | sms-sender; user submits code → consumption API (not via
# transport) → server + client session; logout → gateway → transport →
# router-orchestrator → session-persister → user store.
# Bus plane: Ergo family (e.g. Hypergo/OpenErgo stack in ref impl) — logical id below.

esb: "0.1"

meta:
  id: ideal-system
  product: circuit-leagues
  scope: "PWA (web + Android/iOS via install); auth + session only for this cut"
  summary: >
    Passwordless, user-emergent identity: no explicit registration; OTP to email/SMS
    as the only step. Writes that enter the pipeline use the OpenErgo HTTP gateway
    onto the bus; session verify/persist for login uses the consumption API.

slices:
  - namespace: circuit-leagues
    components:
      # Hosted static/edge asset; targets consumption API + gateway URLs.
      - id: circuit-leagues-pwa
        depends_on:
          - circuit-leagues-consumption-api
          - openergo-http-gateway

      # Auth start, logout publish — ingress to openergo transport.
      - id: openergo-http-gateway
        depends_on:
          - openergo-transport

      # OTP verify, session establish/read — self-service API (not via bus).
      - id: circuit-leagues-consumption-api
        depends_on:
          - user-profile-store

      # Pipeline: issue code, persist to user schema, publish delivery event.
      - id: authcode-generator
        depends_on:
          - openergo-transport
          - user-profile-store

      - id: email-sender
        depends_on:
          - openergo-transport

      - id: sms-sender
        depends_on:
          - openergo-transport

      # Logout: reshape event for persistence path.
      - id: logout-router-orchestrator
        depends_on:
          - openergo-transport

      # General-purpose persister in this slice: session row delete/upsert from logout.
      - id: session-persister
        depends_on:
          - openergo-transport
          - user-profile-store
