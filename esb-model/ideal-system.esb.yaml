# Ideal system — ESB exercise model
# CircuitLeagues (phase 1): PWA + passwordless OTP auth + session.
# Environment NOT in file — supplied at deploy invocation only.
# See esb-model/README.md | Narrative challenges: esb-model/EVALUATION.md

esb: "0.1"

meta:
  product: circuit-leagues
  phase: auth-session-m1
  summary: >
    Progressive web app (Android, iPhone, desktop secondary); single initial capability:
    user-emergent identity (no explicit registration), passwordless OTP via email/SMS.
    Reads/verification via consumption API; writes/pipelines via OpenErgo HTTP gateway and bus.

# Optional per-component `summary` is for humans (exercise); not strict ESB grammar.

slices:
  - namespace: circuit-leagues
    components:
      - id: circuit-leagues-pwa
        summary: >
          PWA client — landing, identifier capture, OTP field, client session holder,
          logout trigger to gateway.
        depends_on:
          - circuit-leagues-consumption-api
          - open-ergo-http-gateway
      - id: circuit-leagues-consumption-api
        summary: >
          Self-service read/verify path: submit OTP, establish server session;
          not routed through OpenErgo (writes elsewhere use the bus).
        depends_on:
          - circuit-leagues-auth-datastore

  - namespace: open-ergo
    components:
      - id: open-ergo-http-gateway
        summary: >
          Accepts auth-request and logout from client; 200 + bus publish for auth request;
          bus publish for logout.
        depends_on:
          - open-ergo-bus
      - id: authcode-generator
        summary: >
          Consumes auth request from bus; generates OTP; persists to user schema;
          publishes outbound delivery event (email/SMS path).
        depends_on:
          - open-ergo-bus
          - circuit-leagues-auth-datastore
      - id: email-sender
        summary: Consumes authcode delivery events; sends outbound email.
        depends_on:
          - open-ergo-bus
          - email-delivery
      - id: sms-sender
        summary: Consumes authcode delivery events; sends outbound SMS.
        depends_on:
          - open-ergo-bus
          - sms-delivery
      - id: logout-router-orchestrator
        summary: >
          Consumes logout from bus; republishes as session invalidation / upsert intent
          for persistence.
        depends_on:
          - open-ergo-bus
      - id: gp-data-persister
        summary: General-purpose persister; applies session drop from orchestrated events.
        depends_on:
          - open-ergo-bus
          - circuit-leagues-auth-datastore
