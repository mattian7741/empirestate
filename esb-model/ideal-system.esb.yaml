# Ideal system — ESB exercise model
# CircuitLeagues M1: PWA + passwordless auth/session (user narrative → revise as you litigate design).
# Environment is NOT authored here (invocation only). See esb-model/README.md

esb: "0.1"

meta:
  id: ideal-system
  product: circuitleagues
  milestone: auth-session-m1
  summary: >
    Progressive web app (web-hosted; Android/iPhone/desktop). Initial scope: authentication and session
    only. Passwordless: user enters email or phone; no separate registration step (user-emergent).
    Login/logout writes go OpenErgo http-gateway → bus; code verify + session read path via consumption API
    (not carried on the OpenErgo write pipeline). User profile / session / auth code material live in a
    logical user datastore (central vs distributed — unspecified at ESB).

slices:
  - namespace: circuitleagues
    notes: >
      Single product namespace for M1. openergo-bus is shared transport; user-datastore is the logical
      store for profile + auth code + session material. Workflow narrative is in meta.summary and
      esb-model/README.md (update when design changes).
    components:
      # PWA shell + static/hosting as one logical deployable (fine to split later).
      - id: circuitleagues-web
        depends_on:
          - circuit-auth-consumption-api
          - openergo-http-gateway

      # OpenErgo ingress for publish-style commands (login request, logout, outbound dispatch chain).
      - id: openergo-http-gateway
        depends_on:
          - openergo-bus

      # Consumption path: user submits code; server validates, establishes session (client + server persistence).
      - id: circuit-auth-consumption-api
        depends_on:
          - user-datastore

      # Receives login-request event; generates code; persists to user store; publishes delivery event.
      - id: authcode-generator
        depends_on:
          - openergo-bus
          - user-datastore

      - id: email-sender
        depends_on:
          - openergo-bus

      - id: sms-sender
        depends_on:
          - openergo-bus

      # Logout: receives command via gateway; rewrites event for persistence consumer.
      - id: logout-router-orchestrator
        depends_on:
          - openergo-bus

      # General-purpose writer: applies session invalidation / upsert from bus (e.g. logout path).
      - id: data-persister
        depends_on:
          - openergo-bus
          - user-datastore

# Logical artifacts referenced above but not expressed as separate runnable components in M1:
# - openergo-bus
# - user-datastore
